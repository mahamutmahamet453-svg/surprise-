<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumayo 💚</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020802;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
color:white;
height:100vh;
}

#stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;
}

.container{
position:relative;
z-index:5;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
}

.title{
font-size:4rem;
color:#aaffaa;
text-shadow:
0 0 10px #00ff66,
0 0 20px #00ff66,
0 0 40px #00ff66;
margin-bottom:20px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:
0 0 10px #00ff66,
0 0 20px #00ff66;
}
to{
text-shadow:
0 0 20px #00ff66,
0 0 40px #00ff66,
0 0 80px #00ff66;
}
}

.photo{
width:280px;
height:280px;
border-radius:30px;
overflow:hidden;
border:3px solid #66ff99;

box-shadow:
0 0 20px #00ff66,
0 0 50px #00ff66,
0 0 100px #00ff66;

animation:float 4s ease-in-out infinite;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
}

.message{
margin-top:30px;
max-width:700px;
padding:20px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

border:1px solid rgba(0,255,100,.3);

border-radius:25px;

box-shadow:
0 0 20px rgba(0,255,100,.3);
}

#text{
font-size:1.3rem;
line-height:1.8;
min-height:120px;
}

button{
margin-top:20px;
padding:15px 35px;
font-size:1rem;
border:none;
border-radius:50px;
cursor:pointer;

background:#7dff9f;
color:#000;

box-shadow:
0 0 15px #00ff66,
0 0 30px #00ff66;
}

button:hover{
transform:scale(1.05);
}

#second{
display:none;
margin-top:20px;
animation:fade 2s forwards;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.rose{
position:fixed;
font-size:50px;
z-index:1;
animation:pulse 3s infinite;
}

.r1{top:20px;left:20px;}
.r2{top:20px;right:20px;}
.r3{bottom:20px;left:20px;}
.r4{bottom:20px;right:20px;}

@keyframes pulse{
50%{
transform:scale(1.15);
}
}

.heart{
position:fixed;
pointer-events:none;
animation:fly linear forwards;
}

@keyframes fly{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}

</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="rose r1">🌹</div>
<div class="rose r2">🌹</div>
<div class="rose r3">🌹</div>
<div class="rose r4">🌹</div>

<div class="container">

<div class="title">Sumayo 💚</div>

<div class="photo">
<img src="sumayo.jpg">
</div>

<div class="message">

<p id="text"></p>

<button onclick="showLove()">
💚 Fur Qalbigayga
</button>

<div id="second">

<p style="font-size:1.3rem;line-height:1.8">

Waligay ma moodayn inaan sidan oo dhan qof u jeclaan doono,

laakiin adiga yimid oo i aaminsiisay.

<br><br>

Love you so much, Mayoy. 💚✨

</p>

</div>

</div>

</div>

<script>

const msg =
"Markaan eego wajigaaga nuuraya iyo indhahaaga cajiibka ah, waxa igu sii bata jacaylka aan kuu qabo. 💚";

let i=0;

function typeWriter(){

if(i<msg.length){

document.getElementById("text").innerHTML += msg.charAt(i);

i++;

setTimeout(typeWriter,50);

}

}

typeWriter();

function showLove(){

document.getElementById("second").style.display="block";

for(let i=0;i<50;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💚";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=
(15+Math.random()*30)+"px";

heart.style.animationDuration=
(4+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},9000);

}

}

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<150;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2

});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#88ff88";

stars.forEach(star=>{

ctx.beginPath();

ctx.arc(star.x,star.y,star.r,0,Math.PI*2);

ctx.fill();

star.y+=0.2;

if(star.y>canvas.height){

star.y=0;

star.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
